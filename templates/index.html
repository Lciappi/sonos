<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sonos Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Sonos</h1>
    <div class="header-actions">
      <span id="status" class="status">Loading…</span>
      <button id="alarms-btn" type="button">Alarms</button>
      <button id="refresh" type="button" title="Re-discover speakers">Re-scan</button>
    </div>
  </header>

  <main id="groups" class="groups"></main>

  <aside id="drawer" class="drawer hidden">
    <div class="drawer-head">
      <h2 id="drawer-title">Alarms</h2>
      <button id="drawer-close" type="button">×</button>
    </div>
    <div id="drawer-body" class="drawer-body"></div>
  </aside>

  <div id="overlay" class="overlay hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
